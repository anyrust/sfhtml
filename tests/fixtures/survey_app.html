# SurveyApp — Total station survey data visualization, 12 public APIs

## 1. Overview
SurveyApp is a single-file HTML application for total station survey data visualization.
Supports GSI, TRA, CSV, and THT file formats.

## 2. Public JavaScript API
- `window.SurveyApp.loadFile(file)` — Load a survey data file
- `window.SurveyApp.renderTraverse()` — Render the traverse diagram
- `window.SurveyApp.exportCSV()` — Export data to CSV

## 3. Automation Example
```js
const page = await browser.newPage();
await page.goto('file:///path/to/survey_app.html');
await page.evaluate(() => window.SurveyApp.loadFile(testFile));
```

## 4. Conventions
- Angles in DMS (degrees, minutes, seconds)
- Distances in meters
- Coordinates in local grid system

<body>
<div id="app-container">
    <div id="toolbar">
        <button onclick="loadFile()">Load File</button>
        <button onclick="exportCSV()">Export CSV</button>
    </div>
    <div id="canvas-area">

<script>
const SurveyMath = {
    toRadians: function(degrees) {
        return degrees * Math.PI / 180;
    },
    toDegrees: function(radians) {
        return radians * 180 / Math.PI;
    },
    formatDMS: function(decimal) {
        const d = Math.floor(decimal);
        const m = Math.floor((decimal - d) * 60);
        const s = ((decimal - d) * 60 - m) * 60;
        return `${d}°${m}'${s.toFixed(2)}"`;
    },
    parseAngle: function(dmsString) {
        const parts = dmsString.match(/(\d+)[°](\d+)['](\d+\.?\d*)["]?/);
        if (!parts) return NaN;
        return parseInt(parts[1]) + parseInt(parts[2]) / 60 + parseFloat(parts[3]) / 3600;
    },
    distance: function(p1, p2) {
        return Math.sqrt(Math.pow(p2.x - p1.x, 2) + Math.pow(p2.y - p1.y, 2));
    }
};

const DataFusion = {
    selectPrimaryStationName: function(aliases) {
        // Select best station name by priority rules
        if (!aliases || aliases.length === 0) return null;
        return aliases.sort((a, b) => a.length - b.length)[0];
    },
    fuseObservations: function(foresight, backsight) {
        // Fuse FS/BS pair into a single observation
        return {
            angle: (foresight.angle + backsight.angle) / 2,
            distance: (foresight.distance + backsight.distance) / 2,
            station: foresight.station
        };
    },
    resolveAliases: function(stations) {
        const aliasMap = {};
        stations.forEach(s => {
            const primary = this.selectPrimaryStationName(s.names);
            s.names.forEach(n => { aliasMap[n] = primary; });
        });
        return aliasMap;
    }
};

function adjustTraverseFromData(data) {
    // Unified Bowditch 7-step engine
    // Step 1: Sum angles
    let angleSum = data.observations.reduce((sum, obs) => sum + obs.angle, 0);
    // Step 2: Compute angular misclosure
    const expectedSum = (data.observations.length - 1) * 180;
    const misclosure = angleSum - expectedSum;
    // Step 3: Distribute angular correction
    const correction = -misclosure / data.observations.length;
    data.observations.forEach(obs => { obs.angle += correction; });
    // Step 4: Compute preliminary coordinates
    let coords = [{ x: 0, y: 0 }];
    let bearing = data.initialBearing || 0;
    data.observations.forEach(obs => {
        bearing = (bearing + obs.angle) % 360;
        const rad = SurveyMath.toRadians(bearing);
        const last = coords[coords.length - 1];
        coords.push({
            x: last.x + obs.distance * Math.sin(rad),
            y: last.y + obs.distance * Math.cos(rad)
        });
    });
    // Step 5: Compute linear misclosure
    const lastCoord = coords[coords.length - 1];
    const closureX = data.closingPoint ? data.closingPoint.x - lastCoord.x : 0;
    const closureY = data.closingPoint ? data.closingPoint.y - lastCoord.y : 0;
    // Step 6: Distribute linear correction (Bowditch)
    const totalDist = data.observations.reduce((sum, obs) => sum + obs.distance, 0);
    let cumDist = 0;
    for (let i = 1; i < coords.length; i++) {
        cumDist += data.observations[i - 1].distance;
        coords[i].x += closureX * (cumDist / totalDist);
        coords[i].y += closureY * (cumDist / totalDist);
    }
    // Step 7: Return adjusted coordinates
    return coords;
}

function parseGsiData(text) {
    // GSI file format parser
    const lines = text.split('\n');
    const observations = [];
    lines.forEach(line => {
        const trimmed = line.trim();
        if (!trimmed || trimmed.startsWith('*')) return;
        const parts = trimmed.split(/\s+/);
        if (parts.length >= 4) {
            observations.push({
                station: parts[0],
                target: parts[1],
                angle: parseFloat(parts[2]),
                distance: parseFloat(parts[3])
            });
        }
    });
    return observations;
}

class TraverseRenderer {
    constructor(canvasId) {
        this.canvas = document.getElementById(canvasId);
        this.ctx = this.canvas.getContext('2d');
        this.scale = 1;
        this.offset = { x: 0, y: 0 };
    }

    render(coordinates) {
        const ctx = this.ctx;
        ctx.clearRect(0, 0, this.canvas.width, this.canvas.height);

        if (coordinates.length < 2) return;

        // Auto-fit
        const xs = coordinates.map(c => c.x);
        const ys = coordinates.map(c => c.y);
        const minX = Math.min(...xs), maxX = Math.max(...xs);
        const minY = Math.min(...ys), maxY = Math.max(...ys);
        const rangeX = maxX - minX || 1;
        const rangeY = maxY - minY || 1;
        this.scale = Math.min(this.canvas.width / rangeX, this.canvas.height / rangeY) * 0.8;
        this.offset = {
            x: (this.canvas.width - rangeX * this.scale) / 2 - minX * this.scale,
            y: (this.canvas.height - rangeY * this.scale) / 2 - minY * this.scale
        };

        // Draw lines
        ctx.beginPath();
        ctx.strokeStyle = '#2196F3';
        ctx.lineWidth = 2;
        coordinates.forEach((coord, i) => {
            const sx = coord.x * this.scale + this.offset.x;
            const sy = this.canvas.height - (coord.y * this.scale + this.offset.y);
            if (i === 0) ctx.moveTo(sx, sy);
            else ctx.lineTo(sx, sy);
        });
        ctx.stroke();

        // Draw points
        coordinates.forEach((coord, i) => {
            const sx = coord.x * this.scale + this.offset.x;
            const sy = this.canvas.height - (coord.y * this.scale + this.offset.y);
            ctx.beginPath();
            ctx.arc(sx, sy, 4, 0, 2 * Math.PI);
            ctx.fillStyle = i === 0 ? '#4CAF50' : '#FF5722';
            ctx.fill();
        });
    }
}

// Public API
window.SurveyApp = {
    loadFile: function(file) {
        const reader = new FileReader();
        reader.onload = function(e) {
            const data = parseGsiData(e.target.result);
            const coords = adjustTraverseFromData({ observations: data });
            const renderer = new TraverseRenderer('traverse-canvas');
            renderer.render(coords);
        };
        reader.readAsText(file);
    },
    renderTraverse: function() {
        console.log('Rendering traverse...');
    },
    exportCSV: function() {
        console.log('Exporting CSV...');
    }
};
</script>
